<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Salsa by the Sea</title>
    <style>
      :root {
        --bg: #f4f8ff;
        --card: #ffffff;
        --ink: #1a2440;
        --muted: #4f5d7a;
        --brand: #0d6f73;
        --brand-hover: #095558;
        --shadow: 0 10px 28px rgba(26, 36, 64, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(
          circle at top right,
          #d4f5ee 0%,
          #f4f8ff 45%,
          #e8f0ff 100%
        );
        display: grid;
        place-items: center;
        padding: 1rem;
      }

      main {
        width: 100%;
        max-width: 760px;
        background: var(--card);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 1.25rem;
      }

      h1 {
        margin: 0 0 0.6rem;
        font-size: clamp(1.4rem, 4vw, 2.2rem);
        line-height: 1.2;
      }

      p {
        margin: 0 0 1.2rem;
        color: var(--muted);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.6rem;
        margin-bottom: 0.75rem;
      }

      .btn {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        min-height: 46px;
        border: 0;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.01em;
        background: var(--brand);
        color: #fff;
        transition:
          background-color 0.2s ease,
          transform 0.2s ease;
      }

      .btn:hover,
      .btn:focus-visible {
        background: var(--brand-hover);
        transform: translateY(-1px);
      }

      .btn.secondary {
        background: #eaf4f5;
        color: #174447;
      }

      .btn.secondary:hover,
      .btn.secondary:focus-visible {
        background: #d7ebed;
      }

      @media (min-width: 640px) {
        main {
          padding: 1.8rem;
        }

        .row {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
